name: Build Installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
    branches:
      - main
      - codex/**

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    env:
      CARGO_TARGET_DIR: ${{ runner.temp }}/datascope-tauri-target
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-22.04
            bundles: deb,appimage
          - name: windows
            os: windows-latest
            bundles: msi
          - name: macos
            os: macos-latest
            bundles: dmg

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.20.1"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: dtolnay/rust-toolchain@stable

      - name: Prepare Windows Tauri packaging
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          git config --global core.longpaths true
          New-Item -ItemType Directory -Force -Path "$env:CARGO_TARGET_DIR" | Out-Null
          try {
            New-ItemProperty `
              -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" `
              -Name LongPathsEnabled `
              -Value 1 `
              -PropertyType DWord `
              -Force | Out-Null
          } catch {
            Write-Warning "Could not enable Windows long paths: $_"
          }

          choco install wixtoolset --version=3.11.2 -y --no-progress
          $wixPath = "${env:ProgramFiles(x86)}\WiX Toolset v3.11\bin"
          if (Test-Path $wixPath) {
            Add-Content -Path $env:GITHUB_PATH -Value $wixPath
          }

          dism.exe /Online /Add-Capability /CapabilityName:VBSCRIPT~~~~
          $dismExit = $LASTEXITCODE
          if (($dismExit -ne 0) -and ($dismExit -ne 3010)) {
            Write-Warning (
              "Could not enable the VBSCRIPT optional feature; " +
              "continuing because it may already be available. " +
              "DISM exit code: $dismExit"
            )
          }

          regsvr32.exe /s "$env:WINDIR\System32\vbscript.dll"
          if ($LASTEXITCODE -ne 0) {
            Write-Warning "Could not register System32 vbscript.dll; continuing."
          }
          regsvr32.exe /s "$env:WINDIR\SysWOW64\vbscript.dll"
          if ($LASTEXITCODE -ne 0) {
            Write-Warning "Could not register SysWOW64 vbscript.dll; continuing."
          }

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            build-essential \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            libfuse2

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Build bundled Python runtime
        working-directory: apps/desktop
        run: npm run runtime:build
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Validate runtime
        shell: bash
        run: |
          test -f apps/desktop/src-tauri/resources/datascope-runtime/runtime-manifest.json
          apps/desktop/src-tauri/resources/datascope-runtime/python/bin/python3 -m datascope_api.launcher --help || \
          apps/desktop/src-tauri/resources/datascope-runtime/python/bin/python -m datascope_api.launcher --help || \
          apps/desktop/src-tauri/resources/datascope-runtime/python/python.exe -m datascope_api.launcher --help

      - name: Build Tauri installer
        working-directory: apps/desktop
        run: python ../../packaging/runtime/build_tauri.py --bundles ${{ matrix.bundles }}

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: datascope-studio-${{ matrix.name }}
          path: ${{ env.CARGO_TARGET_DIR }}/release/bundle/**
          if-no-files-found: error

      - name: Draft GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: ${{ env.CARGO_TARGET_DIR }}/release/bundle/**
