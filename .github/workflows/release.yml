name: Build Installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20.20.1"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            build-essential \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Validate product version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            python packaging/release/check_version.py --tag "$GITHUB_REF_NAME"
          else
            python packaging/release/check_version.py
          fi

      - name: Run release sanity checks
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            python packaging/release/sanity_check.py --tag "$GITHUB_REF_NAME"
          else
            python packaging/release/sanity_check.py
          fi

      - name: Run Python tests
        run: python -m pytest -q

      - name: Run desktop tests
        working-directory: apps/desktop
        run: npm test

      - name: Build desktop frontend
        working-directory: apps/desktop
        run: npm run build

      - name: Check Tauri shell
        working-directory: apps/desktop/src-tauri
        run: cargo check --locked

  build:
    name: ${{ matrix.name }}
    needs: quality
    runs-on: ${{ matrix.os }}
    env:
      CARGO_TARGET_DIR: ${{ matrix.target_dir }}
      DATASCOPE_PBS_RELEASE: "20260602"
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            artifact_name: linux-x86_64
            os: ubuntu-22.04
            platform: linux
            arch: x86_64
            bundles: deb,appimage
            target_dir: /tmp/datascope-tauri-target
          - name: Windows x86_64
            artifact_name: windows-x86_64
            os: windows-2022
            platform: windows
            arch: x86_64
            bundles: nsis
            target_dir: C:/datascope-tauri-target
          - name: macOS Apple Silicon
            artifact_name: macos-aarch64
            os: macos-15
            platform: macos
            arch: aarch64
            bundles: dmg
            target_dir: /tmp/datascope-tauri-target
          - name: macOS Intel
            artifact_name: macos-x86_64
            os: macos-15-intel
            platform: macos
            arch: x86_64
            bundles: dmg
            target_dir: /tmp/datascope-tauri-target

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20.20.1"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: dtolnay/rust-toolchain@stable

      - name: Prepare Windows build paths
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          git config --global core.longpaths true
          New-Item -ItemType Directory -Force -Path "$env:CARGO_TARGET_DIR" | Out-Null

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            build-essential \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            libfuse2 \
            xvfb

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Build bundled Python runtime
        working-directory: apps/desktop
        run: npm run runtime:build
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Validate bundled runtime
        shell: bash
        run: |
          test -f apps/desktop/src-tauri/resources/datascope-runtime/runtime-manifest.json
          apps/desktop/src-tauri/resources/datascope-runtime/python/bin/python3 \
            -m datascope_api.launcher --help || \
          apps/desktop/src-tauri/resources/datascope-runtime/python/bin/python \
            -m datascope_api.launcher --help || \
          apps/desktop/src-tauri/resources/datascope-runtime/python/python.exe \
            -m datascope_api.launcher --help

      - name: Build Tauri installer
        run: python packaging/runtime/build_tauri.py --bundles ${{ matrix.bundles }}

      - name: Stage release artifacts
        shell: bash
        run: |
          python packaging/release/prepare_artifacts.py stage \
            --input "$CARGO_TARGET_DIR/release/bundle" \
            --output release-assets \
            --platform "${{ matrix.platform }}" \
            --arch "${{ matrix.arch }}" \
            --runtime-manifest \
              apps/desktop/src-tauri/resources/datascope-runtime/runtime-manifest.json

      - name: Smoke test installed Debian package
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get install -y ./release-assets/DataScope-Studio-v*-linux-amd64.deb
          xvfb-run -a datascope-studio --smoke-test

      - name: Smoke test AppImage
        if: runner.os == 'Linux'
        shell: bash
        run: |
          chmod +x release-assets/DataScope-Studio-v*-linux-x86_64.AppImage
          xvfb-run -a ./release-assets/DataScope-Studio-v*-linux-x86_64.AppImage --smoke-test

      - name: Smoke test installed Windows package
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $installer = Get-ChildItem release-assets -Filter "*-setup.exe" | Select-Object -First 1
          if (-not $installer) { throw "Windows installer was not found" }

          $installDir = Join-Path $env:RUNNER_TEMP "datascope-studio-install"
          New-Item -ItemType Directory -Force -Path $installDir | Out-Null
          Start-Process -FilePath $installer.FullName -ArgumentList "/S", "/D=$installDir" -Wait

          $candidateRoots = @(
            $installDir,
            "$env:LOCALAPPDATA\DataScope Studio",
            "$env:LOCALAPPDATA\Programs\DataScope Studio",
            "$env:ProgramFiles\DataScope Studio",
            "${env:ProgramFiles(x86)}\DataScope Studio"
          ) | Where-Object { $_ -and (Test-Path $_) }
          $expectedNames = @("datascope-studio.exe", "DataScope Studio.exe")
          $candidates = foreach ($root in $candidateRoots) {
            foreach ($name in $expectedNames) {
              $path = Join-Path $root $name
              if (Test-Path $path) { Get-Item $path }
            }
          }
          $exe = $candidates | Select-Object -First 1
          if (-not $exe) {
            Write-Host "Checked install roots:"
            $candidateRoots | ForEach-Object { Write-Host "  $_" }
            throw "Installed DataScope executable was not found"
          }
          & $exe.FullName --smoke-test
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Smoke test mounted macOS package
        if: runner.os == 'macOS'
        shell: bash
        run: |
          dmg="$(find release-assets -name '*.dmg' -print -quit)"
          mount_dir="$RUNNER_TEMP/datascope-dmg"
          mkdir -p "$mount_dir"
          hdiutil attach "$dmg" -mountpoint "$mount_dir" -nobrowse
          detach_dmg() {
            sync || true
            for attempt in 1 2 3 4 5; do
              if hdiutil detach "$mount_dir"; then
                return 0
              fi
              sleep 2
            done
            hdiutil detach "$mount_dir" -force || true
          }
          trap detach_dmg EXIT
          "$mount_dir/DataScope Studio.app/Contents/MacOS/datascope-studio" --smoke-test

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v7
        with:
          name: datascope-studio-${{ matrix.artifact_name }}
          path: release-assets/*
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

  ros2-corpus:
    name: External ROS2 corpus
    if: ${{ vars.DATASCOPE_ROS2_CORPUS != '' }}
    needs: quality
    runs-on: self-hosted
    env:
      DATASCOPE_ROS2_CORPUS: ${{ vars.DATASCOPE_ROS2_CORPUS }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
      - name: Validate Humble and Jazzy bags
        run: python -m pytest tests/integration/test_ros2_corpus.py -q

  release:
    name: Publish prerelease
    if: >-
      ${{
        always() &&
        startsWith(github.ref, 'refs/tags/v') &&
        needs.build.result == 'success' &&
        (needs.ros2-corpus.result == 'success' || needs.ros2-corpus.result == 'skipped')
      }}
    needs: [build, ros2-corpus]
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Download all installers
        uses: actions/download-artifact@v8
        with:
          pattern: datascope-studio-*
          path: release-assets
          merge-multiple: true

      - name: Validate release artifacts
        run: |
          python packaging/release/check_version.py --tag "$GITHUB_REF_NAME"
          python packaging/release/prepare_artifacts.py checksums \
            --directory release-assets
          find release-assets -maxdepth 1 -type f -printf '%f\n' | sort

      - name: Publish GitHub prerelease
        uses: softprops/action-gh-release@v3
        with:
          prerelease: true
          draft: false
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            DataScope Studio prerelease installers include the local API, Python runtime,
            and Rerun. No separate development environment is required.

            These installers are not code-signed. Review the installation notes in the
            README before bypassing Windows SmartScreen or macOS Gatekeeper.
          files: release-assets/*
