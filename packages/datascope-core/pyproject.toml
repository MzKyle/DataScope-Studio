[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "datascope-core"
version = "1.0.0"
description = "Core adapters, mapping, workspace, and Rerun integration for DataScope Studio."
requires-python = ">=3.10"
dependencies = [
  "pandas>=2.0,<3",
  "mcap>=1.3,<2",
  "Pillow>=8.0,<13",
  "pydantic>=2.6,<3",
  "PyYAML>=6.0,<7",
  "rerun-sdk>=0.32,<0.33",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["datascope_core*"]
