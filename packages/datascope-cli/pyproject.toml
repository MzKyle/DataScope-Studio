[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "datascope-cli"
version = "1.0.0"
description = "Command line interface for DataScope Studio."
requires-python = ">=3.10"
dependencies = [
  "datascope-core",
  "typer>=0.12,<1",
]

[project.scripts]
datascope = "datascope_cli.main:app"

[tool.setuptools.packages.find]
where = ["."]
include = ["datascope_cli*"]
