[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "datascope-core"
version = "0.4.0"
description = "Core adapters, mapping, workspace, and Rerun integration for DataScope Studio."
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
dependencies = [
  "numpy>=1.24,<3",
  "pandas>=2.0,<3",
  "mcap>=1.3,<2",
  "rosbags==0.11.3",
  "Pillow>=8.0,<13",
  "pydantic>=2.6,<3",
  "PyYAML>=6.0,<7",
  "rerun-sdk[catalog]>=0.33,<0.34; sys_platform != 'darwin' or platform_machine != 'x86_64'",
  "rerun-sdk==0.26.2; sys_platform == 'darwin' and platform_machine == 'x86_64'",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["datascope_core*"]
